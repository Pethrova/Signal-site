[build]
  command   = "npm run build"
  publish   = "_site"
  base      = "."

[build.environment]
  NODE_VERSION = "20"

# ── Redirect: /blog → /blog/ (trailing slash consistency) ──────────────────
[[redirects]]
  from   = "/blog"
  to     = "/blog/"
  status = 301

# ── 404 page ────────────────────────────────────────────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/404.html"
  status = 404

# ── Security headers on all pages ───────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# ── Cache static assets aggressively ────────────────────────────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
