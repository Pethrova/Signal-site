<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#080706"/>

  <!-- Subtle grid -->
  <defs>
    <pattern id="grid" width="72" height="72" patternUnits="userSpaceOnUse">
      <path d="M 72 0 L 0 0 0 72" fill="none" stroke="rgba(245,166,35,0.04)" stroke-width="1"/>
    </pattern>
    <radialGradient id="fade" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="black" stop-opacity="0"/>
      <stop offset="100%" stop-color="black" stop-opacity="1"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#fade)"/>

  <!-- Ambient glow -->
  <ellipse cx="600" cy="280" rx="420" ry="260" fill="rgba(245,166,35,0.05)" filter="blur(60px)"/>

  <!-- Gold top bar -->
  <rect x="0" y="0" width="1200" height="3" fill="#f5a623"/>

  <!-- Logo row -->
  <text x="48" y="68" font-family="Georgia, serif" font-size="22" fill="#f5a623" letter-spacing="2">◆</text>
  <text x="80" y="68" font-family="Arial Black, Arial, sans-serif" font-size="18" font-weight="900" fill="#f7f3ec" letter-spacing="3">SIGNAL RESOLUTION</text>

  <!-- Post kicker -->
  <text x="600" y="218" font-family="Courier New, monospace" font-size="12" fill="#f5a623" letter-spacing="4" text-anchor="middle">GTM STRATEGY</text>

  <!-- Main headline -->
  <text x="600" y="302" font-family="Arial Black, Arial, sans-serif" font-size="72" font-weight="900" fill="#f7f3ec" letter-spacing="3" text-anchor="middle">TIMING IS THE MISSING</text>
  <text x="600" y="390" font-family="Arial Black, Arial, sans-serif" font-size="72" font-weight="900" fill="#f5a623" letter-spacing="3" text-anchor="middle">VARIABLE IN YOUR GTM</text>

  <!-- Gold accent line -->
  <rect x="570" y="418" width="60" height="2" fill="#f5a623"/>

  <!-- Sub -->
  <text x="600" y="456" font-family="Courier New, monospace" font-size="13" fill="#6e6860" letter-spacing="2" text-anchor="middle">Signal Resolution — GTM Intelligence</text>

  <!-- Bottom right label -->
  <text x="1152" y="606" font-family="Courier New, monospace" font-size="11" fill="#6e6860" letter-spacing="3" text-anchor="end">DIAGNOSTIC ENGINE</text>
</svg>
